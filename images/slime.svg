<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Infinity loop body (∞ shape) -->
  <path d="M30 60 
           C30 35 50 25 60 40 
           C70 55 60 70 60 70 
           C60 70 50 85 60 100 
           C70 115 90 105 90 80 
           C90 55 70 45 60 55 
           C50 65 60 80 60 80 
           C60 80 70 95 60 105
           C50 115 30 105 30 80
           C30 70 35 60 45 55"
        fill="none" stroke="url(#g1)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Eyes on the infinity slime -->
  <ellipse cx="52" cy="58" rx="6" ry="7" fill="#1a1a2e"/>
  <ellipse cx="52" cy="58" rx="4.5" ry="5.5" fill="#fff"/>
  <ellipse cx="50" cy="56" rx="2" ry="2.5" fill="#1a1a2e"/>

  <ellipse cx="72" cy="58" rx="6" ry="7" fill="#1a1a2e"/>
  <ellipse cx="72" cy="58" rx="4.5" ry="5.5" fill="#fff"/>
  <ellipse cx="70" cy="56" rx="2" ry="2.5" fill="#1a1a2e"/>

  <!-- Small blush dots -->
  <circle cx="43" cy="68" r="3" fill="#ec4899" opacity="0.3"/>
  <circle cx="81" cy="68" r="3" fill="#ec4899" opacity="0.3"/>

  <!-- Tiny sparkle dots -->
  <circle cx="35" cy="45" r="1.5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="88" cy="45" r="1.5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="60" cy="38" r="1" fill="#ddd6fe" opacity="0.5"/>
</svg>
