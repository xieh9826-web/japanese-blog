<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="slimeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="60%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="slimeBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0ff"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="175" rx="55" ry="8" fill="rgba(0,0,0,0.12)"/>

  <!-- Slime body (teardrop/blob shape) -->
  <path d="M100 30 C75 30 55 55 50 85 C46 110 48 135 55 150 C58 157 65 162 72 165 C80 168 90 170 100 170 C110 170 120 168 128 165 C135 162 142 157 145 150 C152 135 154 110 150 85 C145 55 125 30 100 30Z" fill="url(#slimeBody)"/>

  <!-- Body highlight -->
  <path d="M80 50 C70 55 62 70 60 90 C58 105 60 120 65 130 C68 135 72 138 76 140 C72 130 70 115 72 95 C74 75 80 60 90 52Z" fill="rgba(255,255,255,0.15)"/>

  <!-- Left eye -->
  <ellipse cx="82" cy="95" rx="14" ry="16" fill="#1a1a2e"/>
  <ellipse cx="82" cy="95" rx="12" ry="14" fill="url(#eyeGlow)"/>
  <ellipse cx="78" cy="90" rx="5" ry="6" fill="#ffffff"/>
  <ellipse cx="85" cy="100" rx="3" ry="3" fill="rgba(0,0,0,0.1)"/>

  <!-- Right eye -->
  <ellipse cx="118" cy="95" rx="14" ry="16" fill="#1a1a2e"/>
  <ellipse cx="118" cy="95" rx="12" ry="14" fill="url(#eyeGlow)"/>
  <ellipse cx="114" cy="90" rx="5" ry="6" fill="#ffffff"/>
  <ellipse cx="121" cy="100" rx="3" ry="3" fill="rgba(0,0,0,0.1)"/>

  <!-- Blush left -->
  <ellipse cx="65" cy="112" rx="9" ry="5" fill="rgba(236,72,153,0.25)"/>

  <!-- Blush right -->
  <ellipse cx="135" cy="112" rx="9" ry="5" fill="rgba(236,72,153,0.25)"/>

  <!-- Mouth (cute smile) -->
  <path d="M90 120 Q100 132 110 120" fill="none" stroke="#6d28d9" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Drop drip left -->
  <path d="M60 158 Q58 170 62 175 Q66 170 64 158Z" fill="#a78bfa"/>

  <!-- Drop drip right -->
  <path d="M140 158 Q138 170 142 175 Q146 170 144 158Z" fill="#a78bfa"/>

  <!-- Drop mid -->
  <ellipse cx="100" cy="168" rx="5" ry="3" fill="#a78bfa" opacity="0.6"/>
</svg>
