<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AISlime — AI 前沿动态聚合 · 每日精选 · 多语言">
  <title>AISlime — AI 前沿动态</title>
  <link rel="icon" href="images/slime.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <img src="images/slime.svg" alt="AISlime" class="logo-img">
        <span>AISlime</span>
      </a>

      <nav class="main-nav" id="mainNav">
        <a href="javascript:void(0)" class="active" data-view="featured" onclick="switchView('featured')" data-i18n="nav.featured">精选</a>
        <a href="javascript:void(0)" data-view="trending" onclick="switchView('trending')" data-i18n="nav.trending">热门</a>
        <a href="javascript:void(0)" data-view="daily" onclick="switchView('daily')" data-i18n="nav.daily">AI 日报</a>
        <a href="about.html" data-i18n="nav.about">关于</a>
      </nav>

      <div class="header-actions">
        <!-- Language Switcher -->
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="zh">繁</button>
          <button class="lang-btn" data-lang="ja">日</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <!-- Theme Toggle -->
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
        <!-- Mobile Menu Toggle -->
        <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
      </div>
    </div>
  </header>

  <!-- ========== HERO ========== -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-slime">
        <img src="images/slime.svg" alt="AISlime" class="hero-slime-img">
      </div>
      <h1>
        <span class="gradient-text">AI Slime</span>
        <small data-i18n="hero.subtitle">AI 前沿动态 · 每日精选</small>
      </h1>
      <p class="hero-desc" data-i18n="hero.desc">多信源聚合 · 热度追踪 · 每日 AI 日报</p>
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-num" id="totalSources">12</span>
          <span class="stat-label" data-i18n="hero.sources">信源</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="todayCount">0</span>
          <span class="stat-label" data-i18n="hero.today">今日更新</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="totalArticles">0</span>
          <span class="stat-label" data-i18n="hero.total">总条目</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ========== HOT TOPICS BAR ========== -->
  <div class="hot-bar">
    <div class="hot-bar-inner">
      <span class="hot-label" data-i18n="hot.label">🔥 当前热点</span>
      <div class="hot-items" id="hotItems">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main-layout">

    <!-- Category Filter -->
    <div class="filter-bar">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all" data-i18n="filter.all">全部</button>
        <button class="filter-tab" data-filter="model" data-i18n="filter.model">模型</button>
        <button class="filter-tab" data-filter="product" data-i18n="filter.product">产品</button>
        <button class="filter-tab" data-filter="industry" data-i18n="filter.industry">行业</button>
        <button class="filter-tab" data-filter="paper" data-i18n="filter.paper">论文</button>
        <button class="filter-tab" data-filter="tutorial" data-i18n="filter.tutorial">教程</button>
      </div>
      <div class="filter-search">
        <input type="text" id="searchInput" data-i18n-placeholder="search.placeholder" placeholder="搜索标题/摘要…">
        <button class="search-btn" data-i18n="search.btn">🔍</button>
      </div>
    </div>

    <!-- News Timeline -->
    <div class="timeline" id="timeline">
      <!-- Injected by JS -->
    </div>

  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-section">
        <h4>🧪 AISlime</h4>
        <p data-i18n="footer.desc">AI 前沿动态聚合平台 · 每日精选 · 多信源追踪</p>
        <div class="footer-social">
          <a href="#" title="Twitter">𝕏</a>
          <a href="#" title="GitHub">⌘</a>
          <a href="#" title="RSS">📡</a>
        </div>
      </div>
      <div class="footer-section">
        <h4 data-i18n="nav.title">导航</h4>
        <ul>
          <li><a href="javascript:void(0)" onclick="switchView('featured')" data-i18n="nav.featured">精选</a></li>
          <li><a href="javascript:void(0)" onclick="switchView('trending')" data-i18n="nav.trending">热门</a></li>
          <li><a href="javascript:void(0)" onclick="switchView('daily')" data-i18n="nav.daily">AI 日报</a></li>
          <li><a href="about.html" data-i18n="nav.about">关于</a></li>
        </ul>
      </div>
      <div class="footer-section">
        <h4 data-i18n="categories.title">分类</h4>
        <ul>
          <li><a href="#" data-i18n="filter.model">模型</a></li>
          <li><a href="#" data-i18n="filter.product">产品</a></li>
          <li><a href="#" data-i18n="filter.industry">行业</a></li>
          <li><a href="#" data-i18n="filter.paper">论文</a></li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <span>&copy; 2026 AISlime. Built with ❤️</span>
    </div>
  </footer>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTop">↑</button>

  <!-- Inline view switching (CDN cache bypass) -->
  <script>
  function switchView(v) {
    document.querySelectorAll('.main-nav a[data-view]').forEach(a => a.classList.toggle('active', a.dataset.view === v));
    if (typeof renderNews === 'function') {
      if (window.currentView !== undefined) window.currentView = v;
      renderNews();
    }
    window.location.hash = v;
  }
  </script>

  <script src="js/data.js?v=20260623"></script>
  <script src="js/i18n.js?v=20260623"></script>
  <script src="js/main.js?v=20260623"></script>
</body>
</html>
